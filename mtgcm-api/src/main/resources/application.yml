spring:
  application:
    name: mtgcm-api
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:h2:file:./mtgcm-db
    driverClassName: org.h2.Driver
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

logging:
  level:
    root: info
